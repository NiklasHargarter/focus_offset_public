# Config for ConvNeXt V2 Tiny (Baseline: RGB Only)
# Usage: python -m src.train fit --config configs/convnext_v2_baseline.yaml

fit:
  trainer:
    precision: bf16-mixed
    logger:
      - class_path: lightning.pytorch.loggers.TensorBoardLogger
        init_args:
          save_dir: logs
          name: focus_convnext_v2_baseline

  model:
    learning_rate: 1e-4
    weight_decay: 0.05
    backbone:
      class_path: src.models.architectures.ConvNeXtV2FocusRegressor
      init_args:
        use_transforms: false

  data:
    batch_size: 64
    num_workers: 4
